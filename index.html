<!DOCTYPE html>
<html>
<head>
<title>Trading Journal Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: Arial;
  padding: 15px;
}

h2 {
  text-align: center;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
  background: #1e293b;
  color: white;
}

textarea {
  height: 60px;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  margin-top: 10px;
}

.card {
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
}

.win {
  background: #064e3b;
}

.loss {
  background: #7f1d1d;
}

.summary {
  background: #1e293b;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
}

.delete {
  background: red;
  margin-top: 8px;
}
</style>
</head>

<body>

<h2>📊 Trading Journal Pro</h2>

<select id="market">
  <option>NIFTY</option>
  <option>FOREX</option>
</select>

<input id="pair" placeholder="Pair / Index (EURUSD / NIFTY)">
<input id="entry" placeholder="Entry Price">
<input id="sl" placeholder="Stop Loss">
<input id="target" placeholder="Target">
<input id="pnl" placeholder="Profit / Loss">

<select id="type">
  <option value="win">Win</option>
  <option value="loss">Loss</option>
</select>

<textarea id="note" placeholder="Trade reason / mistake / emotion..."></textarea>

<button onclick="addTrade()">Add Trade</button>

<div id="list"></div>

<div class="summary">
  <p>Total Trades: <span id="total"></span></p>
  <p>Wins: <span id="wins"></span></p>
  <p>Losses: <span id="losses"></span></p>
  <p>Win Rate: <span id="winrate"></span></p>
  <p>Total PnL: <span id="totalpnl"></span></p>
</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

function addTrade() {
  let trade = {
    market: market.value,
    pair: pair.value,
    entry: entry.value,
    sl: sl.value,
    target: target.value,
    pnl: parseFloat(pnl.value),
    type: type.value,
    note: note.value
  };

  trades.push(trade);
  localStorage.setItem("trades", JSON.stringify(trades));
  updateUI();
}

function deleteTrade(i) {
  trades.splice(i,1);
  localStorage.setItem("trades", JSON.stringify(trades));
  updateUI();
}

function updateUI() {
  list.innerHTML = "";

  let wins=0, losses=0, totalPnL=0;

  trades.forEach((t,i) => {
    let div = document.createElement("div");
    div.className = "card " + t.type;

    div.innerHTML = `
      <b>${t.market} - ${t.pair}</b><br>
      Entry: ${t.entry} | SL: ${t.sl}<br>
      Target: ${t.target}<br>
      PnL: ${t.pnl}<br>
      Note: ${t.note}
      <button class="delete" onclick="deleteTrade(${i})">Delete</button>
    `;

    if(t.type==="win") wins++;
    else losses++;

    totalPnL += t.pnl;

    list.appendChild(div);
  });

  let total = trades.length;
  let winrate = total ? ((wins/total)*100).toFixed(1) : 0;

  totalEl.innerText = total;
  winsEl.innerText = wins;
  lossesEl.innerText = losses;
  winrateEl.innerText = winrate + "%";
  totalpnlEl.innerText = totalPnL;
}

const market = document.getElementById("market");
const pair = document.getElementById("pair");
const entry = document.getElementById("entry");
const sl = document.getElementById("sl");
const target = document.getElementById("target");
const pnl = document.getElementById("pnl");
const type = document.getElementById("type");
const note = document.getElementById("note");

const list = document.getElementById("list");

const totalEl = document.getElementById("total");
const winsEl = document.getElementById("wins");
const lossesEl = document.getElementById("losses");
const winrateEl = document.getElementById("winrate");
const totalpnlEl = document.getElementById("totalpnl");

updateUI();

</script>

</body>
</html>
